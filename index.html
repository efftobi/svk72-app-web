<title>SVK 72 Wasserball</title>
<style>
  :root{
    /* SVK-72-Farben: Original-Logo-Blau & Ball-Gelb */
    --primary:#063296; --primary-dark:#04246e; --primary-light:#1a4fc0; --accent:#f5b91e;
    --bg:#f4f5f6; --card:#fff; --text:#1a1a1a; --muted:#6b7280;
    --win:#16a34a; --loss:#dc2626; --draw:#6b7280;
    --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text)}
  #app{min-height:100%;display:flex;flex-direction:column}
  header{background:var(--primary);color:#fff;padding:calc(var(--sat) + 14px) 16px 12px;position:sticky;top:0;z-index:5;border-bottom:3px solid var(--accent)}
  header h1{font-size:19px;font-weight:700}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{width:36px;height:36px;border-radius:50%;background:#fff}
  header .sub{font-size:12px;opacity:.75;margin-top:2px}
  .back{background:none;border:none;color:#fff;font-size:15px;padding:0 0 6px;cursor:pointer;opacity:.9}
  .content{padding:14px 14px calc(var(--sab) + 20px);flex:1;max-width:560px;width:100%;margin:0 auto}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:14px 4px 6px}
  .card{background:var(--card);border-radius:14px;padding:13px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .tappable{cursor:pointer;transition:transform .08s}
  .tappable:active{transform:scale(.98)}
  .team-row{display:flex;align-items:center;gap:12px}
  .badge{min-width:44px;height:38px;padding:0 6px;border-radius:10px;background:var(--primary-dark);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
  .badge.j{background:var(--accent);color:var(--primary-dark)}
  .team-row .info{flex:1;min-width:0}
  .team-row .name{font-weight:600;font-size:15px}
  .team-row .liga{font-size:12px;color:var(--muted)}
  .star{color:#d1d5db;font-size:20px;background:none;border:none;cursor:pointer;padding:4px}
  .star.on{color:var(--accent)}
  .fav-card{border-left:4px solid var(--accent)}
  .nextline{font-size:12.5px;color:var(--muted);margin-top:5px}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;color:var(--primary-dark);background:#e6effa;border-radius:8px;padding:2px 8px;margin-top:6px}
  .tabs{display:flex;background:var(--primary);position:sticky;top:calc(var(--sat) + 64px);z-index:4}
  .tabs button{flex:1;padding:11px 4px;background:none;border:none;color:rgba(255,255,255,.65);font-size:12.5px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent}
  .tabs button.on{color:#fff;border-bottom-color:var(--accent)}
  .match{display:flex;align-items:center;gap:10px}
  .match .date{width:54px;text-align:center;flex-shrink:0}
  .match .date .d{font-weight:700;font-size:14px}
  .match .date .m{font-size:10.5px;color:var(--muted);text-transform:uppercase}
  .match .vs{flex:1;min-width:0}
  .match .vs .opp{font-weight:600;font-size:13.5px}
  .match .vs .where{font-size:11.5px;color:var(--muted)}
  .score{font-weight:700;font-size:15px}
  .score.w{color:var(--win)}.score.l{color:var(--loss)}.score.d{color:var(--draw)}
  .time{font-size:13px;font-weight:600;color:var(--primary)}
  table{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  th{background:#eef1f4;color:var(--muted);font-size:10.5px;text-transform:uppercase;padding:8px 5px;text-align:center}
  th:nth-child(2){text-align:left}
  td{padding:8px 5px;text-align:center;border-top:1px solid #f0f2f4}
  td:nth-child(2){text-align:left;font-weight:500}
  tr.me{background:#e8f1fa;font-weight:700}
  .train .day{font-weight:700;font-size:14px;color:var(--primary)}
  .train .tinfo{font-size:13px;margin-top:2px}
  .train .tplace{font-size:12px;color:var(--muted);margin-top:1px}
  .detail-hero{background:var(--primary);color:#fff;padding:18px 16px;border-radius:14px;text-align:center;margin-bottom:10px}
  .detail-hero .teams{font-size:16px;font-weight:700}
  .detail-hero .when{font-size:13px;opacity:.85;margin-top:6px}
  .label{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.06em}
  .a{font-size:14px;margin-top:4px;line-height:1.45}
  .btnrow{display:flex;gap:8px;margin-top:10px}
  .btn{flex:1;padding:12px;border:none;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;color:inherit;display:block}
  .btn.p{background:var(--primary);color:#fff}
  .btn.s{background:#e4e9ef;color:var(--primary)}
  .hint{font-size:11px;color:var(--muted);text-align:center;margin:10px 0 4px}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:30px 20px;line-height:1.6}
  .banner{background:#fffbe8;border:1px solid #e8d78a;border-radius:12px;padding:10px 12px;font-size:12.5px;color:#57430a;margin-bottom:10px;line-height:1.45}
  .ibtn{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.85);background:none;color:#fff;font-size:17px;font-weight:700;font-style:italic;font-family:Georgia,serif;cursor:pointer;flex-shrink:0}
  .zrow{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid #f0f2f4;font-size:13.5px}
  .zrow:last-of-type{border-bottom:none}
  .zrow .zt{color:var(--muted)}
  .zrow .zz{font-weight:600;text-align:right}
</style>
</head>

     "zeit": "08:00 – 19:45 Uhr"
    }
   ]
  },
  "gastro": {
   "titel": "Gaststätte „Zur Kull\" · Restaurant Buonissimo",
   "zeiten": [
    {
     "tage": "Sommer · Montag",
     "zeit": "13:00 – 22:00 Uhr"
    },
    {
     "tage": "Sommer · Di – Sa, Sonn- & Feiertage",
     "zeit": "11:00 – 22:00 Uhr"
    },
    {
     "tage": "Warme Küche",
     "zeit": "12:00 – 21:30 Uhr"
    },
    {
     "tage": "Winter · Mittwoch – Sonntag",
     "zeit": "16:00 – 22:00 Uhr"
    }
   ],
   "info": "An den Ruhetagen können private Veranstaltungen gebucht werden.",
   "kontakt": "Devran Dogan",
   "telefon": "+49 1590 6485464"
  },
  "stand": "20.07.2026"
 },
 "stand": "19.07.2026"
};

/* ================= Helpers ================= */
const $ = (s) => document.querySelector(s);
const MON = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const WTAGE = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function store(key, val) { try { if (val === undefined) return JSON.parse(localStorage.getItem(key)); localStorage.setItem(key, JSON.stringify(val)); } catch { return null; } }
let favs = store("svk72_favs") || ["u14"];

const dOf = (m) => new Date(m.d + "T" + (m.zeit || "23:59"));
const played = (m) => m.th !== undefined;
const svkWon = (m) => played(m) && ((m.h && m.th > m.tg) || (!m.h && m.tg > m.th));
const svkLost = (m) => played(m) && ((m.h && m.th < m.tg) || (!m.h && m.tg < m.th));

function nextMatch(teamId) {
  const now = new Date();
  return (DATA.matches[teamId] || []).filter(m => !played(m) && dOf(m) >= now)[0];
}

/* ================= Views ================= */
function render(html) { $("#app").innerHTML = html; window.scrollTo(0, 0); }

function homeView() {
  const teamCard = (t, fav) => {
    const nm = t.live ? nextMatch(t.id) : null;
    const st = t.live ? (DATA.standings[t.id] || []).find(r => r[8]) : null;
    return `<div class="card tappable ${fav ? "fav-card" : ""}" onclick="openTeam('${t.id}')">
      <div class="team-row">
        <div class="badge ${t.jugend ? "j" : ""}">${esc(t.badge)}</div>
        <div class="info"><div class="name">${esc(t.name)}</div><div class="liga">${esc(t.liga)}</div></div>
        <button class="star ${favs.includes(t.id) ? "on" : ""}" onclick="toggleFav(event,'${t.id}')">★</button>
      </div>
      ${nm ? `<div class="nextline">Nächstes Spiel: ${fmtShort(nm)}</div>` : ""}
      ${st ? `<span class="pill">Platz ${st[0]} · ${st[7]} Punkte</span>` : ""}
    </div>`;
  };
  const favTeams = DATA.teams.filter(t => favs.includes(t.id));
  const rest = DATA.teams.filter(t => !favs.includes(t.id));
  render(`
    <header><div class="brand"><img src="logo-header.png" alt=""><div style="flex:1;min-width:0"><h1>SVK 72 Wasserball</h1><div class="sub">Schwimm-Vereinigung Krefeld 1972 e. V.</div></div><button class="ibtn" onclick="infoView()" aria-label="Vereins-Infos">i</button></div></header>
    <div class="content">
      ${favTeams.length ? `<div class="section-label">★ Meine Teams</div>` + favTeams.map(t => teamCard(t, true)).join("") : ""}
      <div class="section-label">Jugend</div>
      ${rest.filter(t => t.jugend).map(t => teamCard(t)).join("")}
      <div class="section-label">Erwachsene</div>
      ${rest.filter(t => !t.jugend).map(t => teamCard(t)).join("")}
      <div class="hint">Alle Teams mit echten DSV-Daten der Saison 2025/26 (Stand ${DATA.stand}) · U12/U18 in Spielgemeinschaft mit dem Uerdinger SV 08 · neue Saison startet im Herbst</div>
    </div>`);
}

function fmtShort(m) {
  const d = new Date(m.d + "T12:00");
  return `${WTAGE[d.getDay()].slice(0,2)} ${String(d.getDate()).padStart(2,"0")}.${String(d.getMonth()+1).padStart(2,"0")}.` +
         (m.zeit ? ` · ${m.zeit}` : "") + ` · ${m.h ? "Heim vs. " + m.gast : "@ " + m.heim}`;
}

let curTab = "spiele";
function teamView(teamId, tab) {
  curTab = tab || "spiele";
  const t = DATA.teams.find(x => x.id === teamId);
  const matches = DATA.matches[teamId] || [];
  const tabBtn = (id, label) => `<button class="${curTab === id ? "on" : ""}" onclick="openTeam('${teamId}','${id}')">${label}</button>`;

  let body = "";
  if (!t.live && curTab !== "training") {
    body = `<div class="empty">Für dieses Team werden die Spieldaten mit der DSV-Anbindung freigeschaltet.<br><br>Die U14 zeigt schon, wie es aussieht!</div>`;
  } else if (curTab === "spiele") {
    body = matches.map((m, i) => matchCard(teamId, m, i)).join("") +
           `<div class="hint">Quelle: DSV-Ergebnisdienst · Stand ${DATA.stand}</div>`;
  } else if (curTab === "tabelle") {
    const st = DATA.standings[teamId] || [];
    if (!st.length) {
      body = `<div class="empty">Noch keine Tabelle vorhanden.<br><br>Sobald die neue Saison beim DSV online ist, erscheint sie hier automatisch.</div>`;
    } else {
      const rows = st.map(r =>
        `<tr class="${r[8] ? "me" : ""}"><td>${r[0]}</td><td>${esc(r[1])}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[7]}</td></tr>`).join("");
      body = `<table><tr><th>#</th><th>Mannschaft</th><th>Sp</th><th>S</th><th>U</th><th>N</th><th>Tore</th><th>Pkt</th></tr>${rows}</table>
              <div class="hint">${esc(t.liga)} · Stand ${DATA.stand}</div>`;
    }
  } else if (curTab === "next") {
    const up = matches.map((m, i) => [m, i]).filter(([m]) => !played(m) && dOf(m) >= new Date());
    body = up.length ? up.map(([m, i]) => matchCard(teamId, m, i)).join("")
                     : `<div class="empty">Keine anstehenden Spiele — die neue Saison startet im Herbst.</div>`;
  } else {
    const tr = DATA.trainings[teamId] || [];
    body = (tr.length ? tr.map(x => x.von
      ? `<div class="card train"><div class="day">${esc(x.tag)}</div>
        <div class="tinfo">${esc(x.von)} – ${esc(x.bis)} Uhr</div>
        <div class="tplace">${esc(x.ort)}${x.info ? " · " + esc(x.info) : ""}</div></div>`
      : `<div class="card train"><div class="day">${esc(x.tag)}</div>
        <div class="tplace">${esc(x.info || "")}</div></div>`).join("")
      : `<div class="empty">Noch keine Trainingszeiten hinterlegt.</div>`);
  }

  render(`
    <header><button class="back" onclick="homeView()">‹ Teams</button>
      <h1>${esc(t.name)}</h1><div class="sub">${esc(t.liga)}</div></header>
    <div class="tabs">${tabBtn("spiele","Spiele")}${tabBtn("tabelle","Tabelle")}${tabBtn("next","Nächste")}${tabBtn("training","Training")}</div>
    <div class="content">${body}</div>`);
}

function matchCard(teamId, m, i) {
  const d = new Date(m.d + "T12:00");
  const right = played(m)
    ? `<div class="score ${svkWon(m) ? "w" : svkLost(m) ? "l" : "d"}">${m.th} : ${m.tg}</div>`
    : `<div class="time">${m.zeit || "–"}</div>`;
  const v = DATA.venues[m.ort];
  const sub = played(m) ? (m.h ? "Heim" : "Auswärts")
                        : `${v ? esc(v.name) + (v.ort ? ", " + esc((v.ort || "").replace(/^\d+\s*/, "")) : "") : (m.h ? "Heim" : "Auswärts")}`;
  return `<div class="card tappable" onclick="detailView('${teamId}',${i})">
    <div class="match">
      <div class="date"><div class="d">${String(d.getDate()).padStart(2,"0")}</div><div class="m">${MON[d.getMonth()]}</div></div>
      <div class="vs"><div class="opp">${esc(short(m.heim))} – ${esc(short(m.gast))}</div><div class="where">${sub}</div></div>
      ${right}</div></div>`;
}
const short = (n) => n.replace("SV Krefeld 1972 III", "SVK 72 III").replace("SV Krefeld 1972 II", "SVK 72 II")
  .replace("SV Krefeld 1972", "SVK 72")
  .replace("Uerdinger Schwimmverein 08 II", "USV 08 II").replace("Uerdinger Schwimmverein 08", "USV 08")
  .replace("White Sharks Hannover", "White Sharks").replace("Rote Erde/SWIM-TEAM TuS 1859 Hamm", "Rote Erde Hamm")
  .replace("SGW Rhenania/BW Poseidon Köln", "Rhenania/Poseidon Köln").replace("HSC Hellas-1899 Hildesheim", "Hellas Hildesheim")
  .replace("SGW SC Solingen/Wfr. Wuppertal", "Solingen/Wuppertal").replace("SC Neustadt/Weinstraße", "Neustadt/Weinstr.")
  .replace("SpVg Laatzen 1894", "Laatzen").replace("Teilnehmer werden zugelost", "Teilnehmer offen");

function detailView(teamId, i) {
  const t = DATA.teams.find(x => x.id === teamId);
  const m = DATA.matches[teamId][i];
  const v = DATA.venues[m.ort] || {};
  const d = new Date(m.d + "T12:00");
  const when = `${WTAGE[d.getDay()]}, ${d.getDate()}. ${["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"][d.getMonth()]} ${d.getFullYear()}` + (m.zeit ? ` · ${m.zeit} Uhr` : "");
  const mapsQ = encodeURIComponent(v.maps || v.name || "");
  const result = played(m) ? `<div style="font-size:26px;font-weight:800;margin-top:8px">${m.th} : ${m.tg}</div>` : "";
  render(`
    <header><button class="back" onclick="openTeam('${teamId}','${curTab}')">‹ ${esc(t.name)}</button>
      <h1>${m.h ? "Heimspiel" : "Auswärtsspiel"}</h1><div class="sub">${esc(t.liga)}</div></header>
    <div class="content">
      <div class="detail-hero"><div class="teams">${esc(m.heim)} – ${esc(m.gast)}</div><div class="when">${when}</div>${result}</div>
      <div class="card"><div class="label">Spielort</div>
        <div class="a"><strong>${esc(v.name || "Wird noch bekannt gegeben")}</strong>${v.adresse ? "<br>" + esc(v.adresse) : ""}${v.ort ? "<br>" + esc(v.ort) : ""}</div>
        ${v.maps ? `<div class="btnrow">
          <a class="btn p" target="_blank" rel="noopener" href="https://maps.apple.com/?q=${mapsQ}">🧭 Route öffnen</a>
          ${!played(m) ? `<a class="btn s" href="${icsUrl(m, v)}" download="svk72-spiel.ics">📅 In Kalender</a>` : ""}
        </div>` : ""}</div>
      ${m.viertel ? `<div class="card"><div class="label">Spielverlauf</div>
        <table style="margin-top:8px;box-shadow:none">
          <tr><th style="text-align:left">&nbsp;</th><th>1. Vt.</th><th>2. Vt.</th><th>3. Vt.</th><th>4. Vt.</th>${m.ew ? `<th>E.W.</th>` : ""}<th>Ges.</th></tr>
          <tr><td style="text-align:left;font-weight:600">${esc(short(m.heim))}</td>${m.viertel.map(v => `<td>${esc(v.split(":")[0])}</td>`).join("")}${m.ew ? `<td>${esc(m.ew.split(":")[0])}</td>` : ""}<td style="font-weight:700">${m.th}</td></tr>
          <tr><td style="text-align:left;font-weight:600">${esc(short(m.gast))}</td>${m.viertel.map(v => `<td>${esc(v.split(":")[1])}</td>`).join("")}${m.ew ? `<td>${esc(m.ew.split(":")[1])}</td>` : ""}<td style="font-weight:700">${m.tg}</td></tr>
        </table>
        ${m.ew ? `<div class="a" style="font-size:12px;color:var(--muted);margin-top:6px">E.W. = Entscheidungswerfen</div>` : ""}
        <div class="btnrow"><a class="btn s" target="_blank" rel="noopener" href="https://www.schwimmverband.nrw/de/leistungs--und-wettkampfsport/wasserball/veranstaltungen--ergebnisse/">Spielbericht auf swimpool</a></div>
      </div>` : ""}
      ${m.hinweis ? `<div class="card"><div class="label">Info</div><div class="a">${esc(m.hinweis)}</div></div>` : ""}
    </div>`);
}

function icsUrl(m, v) {
  const dt = m.d.replace(/-/g, "");
  const start = m.zeit ? dt + "T" + m.zeit.replace(":", "") + "00" : dt;
  const end = m.zeit ? dt + "T" + String(parseInt(m.zeit) + 2).padStart(2, "0") + m.zeit.slice(3).replace(":", "") + "00" : dt;
  const ics = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//SVK72//App//DE","BEGIN:VEVENT",
    `UID:svk72-${dt}-${(m.gast || "").replace(/\W/g, "")}@svk72`,
    m.zeit ? `DTSTART:${start}` : `DTSTART;VALUE=DATE:${start}`,
    m.zeit ? `DTEND:${end}` : `DTEND;VALUE=DATE:${start}`,
    `SUMMARY:🤽 ${m.heim} – ${m.gast}`,
    `LOCATION:${(v.name || "") + (v.ort ? ", " + v.ort : "")}`,
    "END:VEVENT","END:VCALENDAR"].join("\r\n");
  return "data:text/calendar;charset=utf-8," + encodeURIComponent(ics);
}

/* ================= Vereins-Infos (i-Button) ================= */
function heimspieleWoche() {
  const start = new Date(); start.setHours(0, 0, 0, 0);
  start.setDate(start.getDate() - ((start.getDay() + 6) % 7));   // Montag dieser Woche
  const end = new Date(start); end.setDate(end.getDate() + 7);
  const out = [];
  for (const t of DATA.teams) (DATA.matches[t.id] || []).forEach((m, i) => {
    const d = new Date(m.d + "T12:00");
    if (m.h && d >= start && d < end) out.push({ t, m, i });
  });
  out.sort((a, b) => dOf(a.m) - dOf(b.m));
  return out;
}

function naechstesHeimspiel() {
  const now = new Date();
  let best = null;
  for (const t of DATA.teams) (DATA.matches[t.id] || []).forEach((m, i) => {
    if (m.h && !played(m) && dOf(m) >= now && (!best || dOf(m) < dOf(best.m))) best = { t, m, i };
  });
  return best;
}

function infoView() {
  const v = DATA.verein || {};
  const zeile = (z) => `<div class="zrow"><span class="zt">${esc(z.tage)}</span><span class="zz">${esc(z.zeit)}</span></div>`;
  const heim = heimspieleWoche();
  const nxt = naechstesHeimspiel();
  const heimHtml = heim.length
    ? heim.map(({ t, m, i }) => `<div class="card tappable" style="margin:8px 0 0;box-shadow:none;border:1px solid #eef1f4" onclick="detailView('${t.id}',${i})">
        <div class="match">
          <div class="date"><div class="d">${String(new Date(m.d + "T12:00").getDate()).padStart(2, "0")}</div><div class="m">${MON[new Date(m.d + "T12:00").getMonth()]}</div></div>
          <div class="vs"><div class="opp">${esc(t.name)}: ${esc(short(m.heim))} – ${esc(short(m.gast))}</div>
          <div class="where">${m.zeit ? m.zeit + " Uhr · " : ""}${esc((DATA.venues[m.ort] || {}).name || "Heimbad")}</div></div>
          ${played(m) ? `<div class="score ${svkWon(m) ? "w" : svkLost(m) ? "l" : "d"}">${m.th} : ${m.tg}</div>` : `<div class="time">${m.zeit || ""}</div>`}
        </div></div>`).join("")
    : `<div class="a" style="color:var(--muted)">Diese Woche findet kein Heimspiel statt.${nxt ? `<br>Nächstes Heimspiel: <strong>${fmtShort(nxt.m)}</strong> (${esc(nxt.t.name)})` : " Die neue Saison startet im Herbst."}</div>`;

  render(`
    <header><button class="back" onclick="homeView()">‹ Teams</button>
      <h1>Vereins-Infos</h1><div class="sub">SVK 72 · ${esc(v.adresse || "Palmstraße 8, Krefeld")}</div></header>
    <div class="content">
      ${v.belegung ? `<div class="card"><div class="label">Aktuelle Badbelegung</div>
        <div class="a">${esc(v.belegung.text)}</div>
        <div class="btnrow"><a class="btn p" target="_blank" rel="noopener" href="${v.belegung.url}">🌡️ ${esc(v.belegung.linktext)}</a></div></div>` : ""}
      ${v.bad ? `<div class="card"><div class="label">${esc(v.bad.titel)}</div><div style="margin-top:6px">${v.bad.zeiten.map(zeile).join("")}</div></div>` : ""}
      ${v.gastro ? `<div class="card"><div class="label">${esc(v.gastro.titel)}</div><div style="margin-top:6px">${v.gastro.zeiten.map(zeile).join("")}</div>
        ${v.gastro.info ? `<div class="a" style="font-size:12.5px;color:var(--muted);margin-top:8px">${esc(v.gastro.info)}</div>` : ""}
        ${v.gastro.telefon ? `<div class="btnrow"><a class="btn s" href="tel:${v.gastro.telefon.replace(/\s/g, "")}">📞 ${esc(v.gastro.kontakt || "Gaststätte")} anrufen</a></div>` : ""}</div>` : ""}
      <div class="card"><div class="label">Heimspiele diese Woche</div>${heimHtml}</div>
      <div class="hint">Angaben laut svk72.de · Stand ${esc(v.stand || DATA.stand)} · Änderungen vorbehalten</div>
    </div>`);
}

/* ================= Aktionen ================= */
window.infoView = infoView;
window.openTeam = (id, tab) => teamView(id, tab);
window.detailView = detailView;
window.homeView = homeView;
window.toggleFav = (ev, id) => {
  ev.stopPropagation();
  favs = favs.includes(id) ? favs.filter(x => x !== id) : [...favs, id];
  store("svk72_favs", favs);
  homeView();
};

/* ================= Start ================= */
homeView();
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});

/* Live-Daten laden: data.json wird von GitHub Actions automatisch aktualisiert.
   Eingebaute Daten oben dienen nur noch als Fallback (z. B. komplett offline). */
fetch("data.json?t=" + Date.now())
  .then((r) => (r.ok ? r.json() : null))
  .then((d) => {
    if (d && Array.isArray(d.teams) && d.teams.length) {
      Object.assign(DATA, d);
      homeView();
    }
  })
  .catch(() => {});
</script>
</body>
</html>
