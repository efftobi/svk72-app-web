name: Diagnose DSV

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install httpx beautifulsoup4
      - run: python sync_worker/debug_dump.py
      - run: |
          git config user.name "svk72-daten-bot"
          git config user.email "actions@users.noreply.github.com"
          git add debug.txt
          git diff --cached --quiet || { git commit -m "Diagnose"; git push; }
